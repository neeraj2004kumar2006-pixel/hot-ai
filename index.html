<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    
    <!-- Google Fonts: Poppins (Headings) & Inter (Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6773478707926187" crossorigin="anonymous"></script>
    
    <!-- Primary SEO Meta Tags -->
    <title>Hot AI - Real AI News, Practical Tech Tips & Trusted AI Tools</title>
    <meta name="title" content="Hot AI - Real AI News, Practical Tech Tips & Trusted AI Tools" />
    <meta name="description" content="Hot AI delivers authentic AI news, hands-on tech tutorials, and verified AI tool reviews. No hype, no fluff—just practical insights for developers and tech enthusiasts." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hotai.news/" />
    <meta property="og:title" content="Hot AI - Real AI News, Practical Tech Tips & Trusted AI Tools" />
    <meta property="og:description" content="Hot AI delivers authentic AI news, hands-on tech tutorials, and verified AI tool reviews. No hype, no fluff—just practical insights for developers and tech enthusiasts." />
    <meta property="og:image" content="/assets/images/og-image.webp" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://hotai.news/" />
    <meta property="twitter:title" content="Hot AI - Real AI News, Practical Tech Tips & Trusted AI Tools" />
    <meta property="twitter:description" content="Hot AI delivers authentic AI news, hands-on tech tutorials, and verified AI tool reviews. No hype, no fluff—just practical insights for developers and tech enthusiasts." />
    <meta property="twitter:image" content="/assets/images/og-image.webp" />

    <!-- Mobile Web App Capable -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0F1117" />
  </head>

    <div id="root"></div>

  </body>
